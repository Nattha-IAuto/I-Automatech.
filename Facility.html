<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> I-Automatech Company</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        /* แต่งสีสันเพิ่มเติมให้ดูเป็นแนวโรงงานอุตสาหกรรม (น้ำเงิน-ฟ้า) */
    .navbar { background-color: #000000; 
        }           
    .hero-section {
            background-color: #1a3c5f;
            color: white;
            padding: 100px 0;
            text-align: center;
        }
    .service-card {
            border: none;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            transition: 0.3s;
        }
    .service-card:hover {
            transform: translateY(-5px);
        }
        .img-dimension {
    box-shadow: 0 10px 30px rgba(45, 21, 21, 0.2); /*
    </style>
</head>
<body>

    <div id="Head-placeholder"></div>
    
    <div class="about-header text-center">
        <div class="container">
            <h1 class="display-5 fw-bold mt-4"> Facility </h1>
        </div>
    </div>
            
    <div id="Foot-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
    // 1. ดึงข้อมูลไฟล์ Head.html (เมนูด้านบน)
    fetch('Head.html') 
        .then(response => {
            if (!response.ok) throw new Error("หาไฟล์ Head.html ไม่เจอจ้า");
            return response.text();
        })
        .then(data => {
            document.getElementById('Head-placeholder').innerHTML = data;

            // ตรวจเช็กและไฮไลท์เมนู Active อัตโนมัติ
            const currentPath = window.location.pathname;
            document.querySelectorAll('.navbar-nav .nav-link').forEach(link => {
                const linkPath = link.getAttribute('href');
                if (currentPath.endsWith(linkPath) || (linkPath === 'Web_1.html' && currentPath === '/')) {
                    link.classList.add('active');
                } else {
                    link.classList.remove('active');
                }
            });
        })
        .catch(error => console.error('มีปัญหาในการโหลด Head:', error));


    // 2. [เพิ่มส่วนนี้] ดึงข้อมูลไฟล์ Foot.html (แถบข้อมูลด้านล่าง)
    fetch('Foot.html')
        .then(response => {
            if (!response.ok) throw new Error("หาไฟล์ Foot.html ไม่เจอจ้า");
            return response.text();
        })
        .then(data => {
            // นำโค้ด Footer ไปหย่อนใส่ในกล่อง Foot-placeholder
            document.getElementById('Foot-placeholder').innerHTML = data;
        })
        .catch(error => console.error('มีปัญหาในการโหลด Foot:', error));
</script>
</html>
