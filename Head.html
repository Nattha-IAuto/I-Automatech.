<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <img src="Logo.png" alt="โลโก้บริษัท" style="height: 120px;" class="mb-1 me-3">
        <a class="navbar-brand fw-bold fs-2 text-white" href="index.html">I-Automatech Company</a>
        
        <div class="navbar-nav ms-auto" id="main-nav">
            <a class="nav-link fs-3" href="index.html">Home</a>
            <a class="nav-link fs-3" href="about.html">About Us</a>
            <a class="nav-link fs-3" href="contact.html">Contact</a>
        </div>
    </div>
</nav>

<script>
(function() {
    const path = window.location.pathname.toLowerCase();
    const navLinks = document.querySelectorAll('#main-nav .nav-link');

    // เช็กเงื่อนไขหาหน้าปัจจุบัน
    const isAbout = path.includes('about.html');
    const isContact = path.includes('contact.html');
    // ถ้าไม่ใช่ About และไม่ใช่ Contact หรือ path ลงท้ายด้วยหน้าแรก ให้ถือว่าเป็น Home
    const isHome = (!isAbout && !isContact) || path.includes('index.html') || path.endsWith('/');

    navLinks.forEach(link => {
        const href = link.getAttribute('href').toLowerCase();
        link.classList.remove('active', 'text-white', 'text-white-50');

        if (href === 'index.html' && isHome) {
            link.classList.add('active', 'text-white');
        } else if (href === 'about.html' && isAbout) {
            link.classList.add('active', 'text-white');
        } else if (href === 'contact.html' && isContact) {
            link.classList.add('active', 'text-white');
        } else {
            // ลิงก์ที่ไม่ใช่หน้าปัจจุบันให้เปลี่ยนเป็นสีจาง
            link.classList.add('text-white-50');
        }
    });
})();
</script>
