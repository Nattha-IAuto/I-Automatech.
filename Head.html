<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <img src="Logo.png" alt="โลโก้บริษัท" style="height: 120px;" class="mb-1 me-3">
        <a class="navbar-brand fw-bold fs-2 text-white" href="index.html">I-Automatech Company</a>
        
        <div class="navbar-nav ms-auto" id="main-nav">
            <a class="nav-link fs-3" href="index.html">Home</a>
            <a class="nav-link fs-3" href="about.html">About Us</a>
            <a class="nav-link fs-3" href="contact.html">Contact</a>
        </div>
    </div>
</nav>

<script>
    // ดึง URL ทั้งหมดมาเช็ก
    const currentPath = window.location.pathname;
    
    // ค้นหาลิงก์ทั้งหมดในเมนู
    document.querySelectorAll('#main-nav .nav-link').forEach(link => {
        const linkPage = link.getAttribute('href');
        
        // ล้างคลาสเก่าออกก่อนเพื่อป้องกันการซ้ำซ้อน
        link.classList.remove('active', 'text-white', 'text-white-50');

        if (linkPage === 'index.html') {
            // ถ้าเป็นปุ่ม Home: จะสว่างก็ต่อเมื่อ URL มีคำว่า index.html หรือเป็นหน้าแรกสุด (ที่ไม่มี about หรือ contact)
            if (currentPath.includes('index.html') || (!currentPath.includes('about.html') && !currentPath.includes('contact.html'))) {
                link.classList.add('active', 'text-white');
            } else {
                link.classList.add('text-white-50');
            }
        } else {
            // ถ้าเป็นปุ่มอื่นๆ (about.html, contact.html): ให้เช็กตามชื่อไฟล์ปกติ
            if (currentPath.includes(linkPage)) {
                link.classList.add('active', 'text-white');
            } else {
                link.classList.add('text-white-50');
            }
        }
    });
</script>
