<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <img src="Logo.png" alt="โลโก้บริษัท" style="height: 120px;" class="mb-1 me-3">
        <a class="navbar-brand fw-bold fs-2 text-white" href="index.html">I-Automatech Company</a>
        
        <div class="navbar-nav ms-auto" id="main-nav">
            <a class="nav-link fs-3" href="index.html">Home</a>
            <a class="nav-link fs-3" href="about.html">About Us</a>
            <a class="nav-link fs-3" href="contact.html">Contact</a>
        </div>
    </div>
</nav>

<script>
    // บังคับให้สคริปต์ทำงานเมื่อหน้าเว็บ (DOM) โหลดเสร็จสมบูรณ์แล้วเท่านั้น
    window.addEventListener('DOMContentLoaded', () => {
        // ดึง URL เต็มของหน้าปัจจุบันมาเช็ก (แปลงเป็นพิมพ์เล็กเพื่อป้องกันการพิมพ์ผิด)
        const currentUrl = window.location.href.toLowerCase();
        
        // ค้นหาปุ่มลิงก์ทั้งหมดใน Navbar
        const navLinks = document.querySelectorAll('#main-nav .nav-link');

        navLinks.forEach(link => {
            const linkPage = link.getAttribute('href').toLowerCase();
            
            // ล้างคลาสสีเก่าออกทั้งหมดก่อนเพื่อความชัวร์
            link.classList.remove('active', 'text-white', 'text-white-50');

            if (linkPage === 'index.html') {
                // เงื่อนไขสำหรับปุ่ม Home: 
                // ถ้า URL มีคำว่า 'index.html' หรือเปิดมาแล้วไม่มีคำว่า 'about' และ 'contact' เลย (คือหน้าแรกสุด)
                if (currentUrl.includes('index.html') || (!currentUrl.includes('about') && !currentUrl.includes('contact'))) {
                    link.classList.add('active', 'text-white');
                } else {
                    link.classList.add('text-white-50');
                }
            } else {
                // เงื่อนไขสำหรับหน้าอื่นๆ (About, Contact): ถ้า URL ปัจจุบันมีชื่อไฟล์นั้นอยู่ ให้เปิดไฟสว่าง
                if (currentUrl.includes(linkPage)) {
                    link.classList.add('active', 'text-white');
                } else {
                    link.classList.add('text-white-50');
                }
            }
        });
    });
</script>
