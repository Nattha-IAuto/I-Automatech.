<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <img src="Logo.png" alt="โลโก้บริษัท" style="height: 120px;" class="mb-1 me-3">
        <a class="navbar-brand fw-bold fs-2 text-white" href="index.html">I-Automatech Company</a>
        
        <div class="navbar-nav ms-auto" id="main-nav">
            <a class="nav-link fs-3" href="index.html">Home</a>
            <a class="nav-link fs-3" href="about.html">About Us</a>
            <a class="nav-link fs-3" href="contact.html">Contact</a>
        </div>
    </div>
</nav>

<script>
    // ใช้คำสั่งนี้เพื่อให้รันได้ทันทีและปลอดภัยที่สุด
    (function() {
        // ดึงแค่ path ด้านหลังสุดมาเช็ก
        const path = window.location.pathname.toLowerCase();
        
        // ค้นหาปุ่มลิงก์ทั้งหมด
        const navLinks = document.querySelectorAll('#main-nav .nav-link');

        navLinks.forEach(link => {
            const href = link.getAttribute('href').toLowerCase();

            // เคลียร์คลาสเริ่มต้นทั้งหมดออกก่อนเพื่อไม่ให้ตีกัน
            link.classList.remove('active', 'text-white', 'text-white-50');

            if (href === 'index.html') {
                // ปุ่ม Home: สว่างเมื่อเจอคำว่า index.html หรือ path ลงท้ายด้วยชื่อโปรเจกต์ / หรือไม่มีคำว่า about/contact
                if (path.endsWith('index.html') || (path.endsWith('/index.html') || path.endsWith('/') || (!path.includes('about') && !path.includes('contact'))) {
                    link.classList.add('active', 'text-white');
                } else {
                    link.classList.add('text-white-50');
                }
            } else if (href === 'about.html') {
                // ปุ่ม About Us
                if (path.includes('about')) {
                    link.classList.add('active', 'text-white');
                } else {
                    link.classList.add('text-white-50');
                }
            } else if (href === 'contact.html') {
                // ปุ่ม Contact
                if (path.includes('contact')) {
                    link.classList.add('active', 'text-white');
                } else {
                    link.classList.add('text-white-50');
                }
            }
        });
    })();
</script>
