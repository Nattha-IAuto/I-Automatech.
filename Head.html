<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center fw-bold fs-2 text-white" href="index.html">
            <img src="Logo.png" alt="โลโก้บริษัท" style="height: 120px;" class="mb-1 me-3">
            <span>I-Automatech Company</span>
        </a>
        
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarText" aria-controls="navbarText" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarText">
            <div class="navbar-nav ms-auto" id="main-nav">
                <a class="nav-link fs-3" href="index.html">Home</a>
                <a class="nav-link fs-3" href="about.html">About Us</a>
                <a class="nav-link fs-3" href="contact.html">Contact</a>
            </div>
        </div>
    </div>
</nav>

<script>
// สั่งให้สคริปต์รอให้แท็ก HTML ถูกสร้างเสร็จใน DOM ก่อนทำงาน 0.05 วินาที เพื่อป้องกันการชนกันของฟังก์ชัน
setTimeout(function() {
    const currentUrl = window.location.href.toLowerCase();
    const navLinks = document.querySelectorAll('#main-nav .nav-link');

    const isAbout = currentUrl.includes('about.html');
    const isContact = currentUrl.includes('contact.html');
    // ถ้าไม่มีคำว่า about และ contact เลย ให้เคลมว่าเป็นหน้าแรกทันที
    const isHome = !isAbout && !isContact;

    navLinks.forEach(link => {
        const href = link.getAttribute('href').toLowerCase();
        
        link.classList.remove('active', 'text-white', 'text-white-50');

        if (href.includes('index.html') && isHome) {
            link.classList.add('active', 'text-white');
        } else if (href.includes('about.html') && isAbout) {
            link.classList.add('active', 'text-white');
        } else if (href.includes('contact.html') && isContact) {
            link.classList.add('active', 'text-white');
        } else {
            link.classList.add('text-white-50');
        }
    });
}, 50);
</script>
