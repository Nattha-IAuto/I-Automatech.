    <style>
    /* 🌟 เพิ่มตรงนี้: ดึงให้หน้าจอเต็มและจัดโครงสร้าง Flexbox */
    html, body {
        height: 100%;
        margin: 0;
    }
    body {
        display: flex;
        flex-direction: column;
    }

    .navbar { 
        background-color: #000000; 
    }           
    .hero-section {
        background-color: #1a3c5f;
        color: white;
        padding: 100px 0;
        text-align: center;
    }
    .service-card {
        border: none;
        box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        transition: 0.3s;
    }
    .service-card:hover {
        transform: translateY(-5px);
    }
    
    .img-dimension {
        box-shadow: 0 10px 30px rgba(45, 21, 21, 0.2); 
    }

    /* 🌟 ปรับตรงนี้: เพิ่ม flex: 1 และการจัดกึ่งกลาง (Center) */
    .logo-slider-container {
        flex: 1; 
        display: flex;
        align-items: center;
        justify-content: center;
        
        overflow: hidden;
        padding: 50px 0;
        background-color: #ffffff;
        white-space: nowrap;
        position: relative;
        width: 100%;
    }

    .logo-slider-container::before, 
    .logo-slider-container::after {
        position: absolute;
        top: 0;
        width: 100px;
        height: 100%;
        content: "";
        z-index: 2;
        pointer-events: none;
    }
    .logo-slider-container::before {
        left: 0;
        background: linear-gradient(to right, #ffffff, transparent);
    }
    .logo-slider-container::after {
        right: 0;
        background: linear-gradient(to left, #ffffff, transparent);
    }

    .logo-slider-track {
        display: flex;
        align-items: center;
        width: max-content;
        min-width: max-content; 
        animation: logo-scroll 25s linear infinite;
    }

    .logo-slide {
        width: 250px;
        height: 150px;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-shrink: 0;
    }

    .logo-slide img {
        max-width: 180px;
        height: auto;
        max-height: 150px;
        object-fit: contain;
        transition: all 0.4s ease;
        filter: grayscale(0%);
        opacity: 1; /* แก้ไขจาก 100 เป็น 1 */
    }

    .logo-slider-track:hover {
        animation-play-state: paused; 
    }
    .logo-slide img:hover {
        filter: grayscale(0%);
        opacity: 1;
        transform: scale(1.05); 
    }

    /* แก้ไขระยะวิ่งตรงนี้ให้สอดคล้องกับจำนวนโลโก้ทั้งหมด (24 กล่อง) */
    @keyframes logo-scroll {
        0% { transform: translateX(0); }
        100% { transform: translateX(calc(-250px * 12)); }
    }

    @media (max-width: 767.98px) {
        .about-header h1 {
            font-size: 2rem !important;
            margin-top: 20px !important;
        }
        .logo-slider-container {
            padding: 30px 0 !important;
        }
        .logo-slider-container::before, 
        .logo-slider-container::after {
            width: 40px;
        }
        .logo-slide {
            width: 160px;
            height: 100px;
        }
        .logo-slide img {
            max-width: 120px;
            max-height: 100px;
        }
        .logo-slider-track {
            width: max-content;
            min-width: max-content;
        }
        /* แก้ไขระยะวิ่งหน้าจอมือถือตรงนี้ให้สอดคล้องกับจำนวนโลโก้ทั้งหมด (24 กล่อง) */
        @keyframes logo-scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(calc(-160px * 12)); }
        }
    }
</style>

    <script>

    fetch('Foot.html')

        .then(data => {
